<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Strategy Call | Flow Scale Marketing</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Work+Sans:wght@300;400;500;600&family=DM+Sans:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF3366;
            --dark: #0A0E27;
            --light: #F8F9FA;
            --accent: #00D9FF;
            --gray: #6B7280;
        }

        body {
            font-family: 'Work Sans', sans-serif;
            background: var(--dark);
            color: var(--light);
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 51, 102, 0.1);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--light);
            letter-spacing: -0.02em;
            text-decoration: none;
        }

        .logo span {
            color: var(--primary);
        }

        /* Booking Section */
        .booking-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 2rem 4rem;
            position: relative;
        }

        .booking-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 51, 102, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 217, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .booking-container {
            max-width: 700px;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            position: relative;
            z-index: 2;
        }

        .booking-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .booking-header h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        .gradient-text {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .booking-header p {
            color: var(--gray);
            font-size: 1.125rem;
            line-height: 1.6;
        }

        /* Form Styles */
        .booking-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--light);
        }

        .form-group label .required {
            color: var(--primary);
        }

        .form-group input,
        .form-group textarea {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1rem;
            color: var(--light);
            font-family: 'Work Sans', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
        }

        .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--gray);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .submit-btn {
            font-family: 'DM Sans', sans-serif;
            background: var(--primary);
            color: white;
            padding: 1.125rem 2rem;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 1rem;
        }

        .submit-btn:hover {
            background: #E62958;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 51, 102, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .success-message {
            display: none;
            text-align: center;
            padding: 2rem;
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.1), rgba(255, 51, 102, 0.1));
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 16px;
            margin-top: 2rem;
        }

        .success-message.show {
            display: block;
        }

        .success-message h3 {
            font-family: 'DM Sans', sans-serif;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .booking-container {
                padding: 2rem;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="flow-scale-marketing.html" class="logo">Flow<span>Scale</span></a>
        </nav>
    </header>

    <section class="booking-section">
        <div class="booking-container">
            <div class="booking-header">
                <h1>Book Your <span class="gradient-text">Strategy Call</span></h1>
                <p>Fill out the form below and we'll get back to you within 24 hours to schedule your free emergency marketing consultation.</p>
            </div>

            <form class="booking-form" id="bookingForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name <span class="required">*</span></label>
                        <input type="text" id="firstName" name="firstName" placeholder="John" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name <span class="required">*</span></label>
                        <input type="text" id="lastName" name="lastName" placeholder="Smith" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="businessName">Business Name <span class="required">*</span></label>
                    <input type="text" id="businessName" name="businessName" placeholder="Smith Plumbing & Heating" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email Address <span class="required">*</span></label>
                        <input type="email" id="email" name="email" placeholder="john@smithplumbing.co.uk" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number <span class="required">*</span></label>
                        <input type="tel" id="phone" name="phone" placeholder="07852 757 059" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="businessDescription">Brief Business Description <span class="required">*</span></label>
                    <textarea id="businessDescription" name="businessDescription" placeholder="Tell us about your plumbing, bathroom fitting, or heating business. What services do you offer? What areas do you cover? What are your main marketing goals?" required></textarea>
                </div>

                <button type="submit" class="submit-btn">Submit Request</button>

                <div class="success-message" id="successMessage">
                    <h3>✓ Request Submitted!</h3>
                    <p>Thank you for your interest. We'll contact you within 24 hours to schedule your strategy call.</p>
                </div>
            </form>
        </div>
    </section>

    <script>
        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get form data
            const formData = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                businessName: document.getElementById('businessName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                businessDescription: document.getElementById('businessDescription').value
            };

            // Here you would typically send this data to your server
            console.log('Form submitted:', formData);

            // Show success message
            document.getElementById('successMessage').classList.add('show');
            
            // Reset form
            this.reset();
            
            // Scroll to success message
            document.getElementById('successMessage').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        });
    </script>
</body>
</html>
